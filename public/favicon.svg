<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gradPen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="120" fill="#09090b"/>

  <!-- AI Sparkle (Auto/Magic) -->
  <path fill="#ffffff" d="M384,128 C384,160 416,176 448,176 C416,176 384,192 384,224 C384,192 352,176 320,176 C352,176 384,160 384,128 Z"/>

  <!-- Pen shape (Handwriting) -->
  <path d="M140,300 L260,180 A20,20 0 0,1 290,210 L170,330 Z" fill="url(#gradPen)"/>
  <polygon points="140,300 170,330 110,360" fill="#6366f1"/>
  <polygon points="135,320 150,335 110,360" fill="#ffffff"/>

  <!-- Categorization (Folders / Tags / Organized Lines) -->
  <rect x="280" y="260" width="120" height="32" rx="16" fill="#ec4899" />
  <rect x="320" y="320" width="80" height="32" rx="16" fill="#3b82f6" />
  <rect x="240" y="380" width="160" height="32" rx="16" fill="#10b981" />
  
  <!-- Swirl connecting pen to categories (Flow) -->
  <path d="M110,360 C 100,450 200,450 220,396" fill="none" stroke="#a78bfa" stroke-width="8" stroke-linecap="round" stroke-dasharray="12 12"/>
</svg>