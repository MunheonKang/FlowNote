<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Base Gradient: Left (Yellow) to Right (Blue) -->
    <linearGradient id="geminiBase" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#fbbc05"/>
      <stop offset="100%" stop-color="#4285f4"/>
    </linearGradient>
    
    <!-- Overlay Gradient: Top (Red) to Bottom (Green) -->
    <linearGradient id="geminiOverlay" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ea4335" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ea4335" stop-opacity="0"/>
      <stop offset="60%" stop-color="#34a853" stop-opacity="0"/>
      <stop offset="100%" stop-color="#34a853" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="120" fill="#09090b"/>

  <!-- Gemini Sparkle (추가해주신 원본 이미지 사용) -->
  <image href="gemini.webp" x="80" y="80" width="200" height="200" />

  <!-- Categorization Rectangles (우하단 대각선 계단식 배치) -->
  <g fill="none" stroke-width="4" stroke-linejoin="round">
    <!-- Pink Box -->
    <rect x="260" y="220" width="160" height="48" rx="8" stroke="#ec4899" />
    <!-- Blue Box -->
    <rect x="320" y="290" width="110" height="48" rx="8" stroke="#3b82f6" />
    <!-- Green Box -->
    <rect x="250" y="360" width="150" height="48" rx="8" stroke="#10b981" />
  </g>
</svg>